<!DOCTYPE html>
<html>
<head>
    <title>Live Network Dashboard</title>

    <style>
        body { font-family: Arial; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background: #5c5858; }
    </style>
</head>

<body>

<h1>Live Network Devices</h1>

<h2 id="count">Devices: 0</h2>

<table>
    <thead>
        <tr>
            <th>IP</th>
            <th>Status</th>
            <th>MAC</th>
            <th>Manufacturer</th>
            <th>Last Seen</th>
        </tr>
    </thead>

    <tbody id="deviceTable"></tbody>
</table>

<script>
    const deviceTable = document.getElementById("deviceTable");
    const countEl = document.getElementById("count");

    function renderDevices(devices) {
        let rows = "";

        devices.forEach((device) => {
            const [status, ip, mac, manufacturer, lastSeen] = device;

            rows += `
                <tr>
                    <td>${ip ?? ""}</td>
                    <td>${status ?? ""}</td>
                    <td>${mac ?? ""}</td>
                    <td>${manufacturer ?? ""}</td>
                    <td>${lastSeen ?? ""}</td>
                </tr>
            `;
        });

        deviceTable.innerHTML = rows;
        countEl.innerText = `Devices: ${devices.length}`;
    }

    async function loadDevices() {
        const response = await fetch('/api/devices');
        const devices = await response.json();
        renderDevices(devices);
    }

    const eventSource = new EventSource('/api/live');

    eventSource.addEventListener('update', (event) => {
        try {
            const devices = JSON.parse(event.data);
            renderDevices(devices);
        } catch (error) {
            console.error('Failed to parse SSE payload:', error);
        }
    });

    eventSource.onerror = () => {
        console.error('SSE connection lost');
    };

    loadDevices();
</script>

</body>
</html>
