<!DOCTYPE html>
<html>
<head>
    <title>Live Network Dashboard</title>

    <style>
        body { font-family: Arial; margin: 20px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        th { background: #5c5858; }
    </style>
</head>

<body>

<h1>Live Network Devices</h1>

<h2 id="count">Devices: 0</h2>

<table>
    <thead>
        <tr>
            <th>IP</th>
            <th>Status</th>
            <th>MAC</th>
            <th>Manufacturer</th>
            <th>Last Seen</th>
        </tr>
    </thead>

    <tbody id="deviceTable"></tbody>
</table>

<script>

async function loadDevices() {
    const response = await fetch('/api/devices');
    const devices = await response.json();

    console.log(devices);

    let rows = ""; 

    devices.forEach(d => {
        console.log("row:", d);

        rows += `
            <tr>
                <td>${d[0] ?? d.status ?? ""}</td>
                <td>${d[1] ?? d.ip ?? ""}</td>
                <td>${d[2] ?? d.mac ?? ""}</td>
                <td>${d[3] ?? d.manufacturer ?? ""}</td>
                <td>${d[4] ?? d.last_seen ?? ""}</td>
            </tr>
        `;
    });

    document.getElementById("deviceTable").innerHTML = rows;
    document.getElementById("count").innerText = `Devices: ${devices.length}`;
}

// first load
loadDevices();

// live updates every 2 seconds
setInterval(loadDevices, 2000);

</script>

</body>
</html>
